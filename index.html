  <style>
    :root {
      --bg: #f7f8fb;

      --muted: #6b7280;

    }
    .card {

      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .04);
    }
    a {
      color: var(--accent);

      font-weight: 700;
    }
    .item {
